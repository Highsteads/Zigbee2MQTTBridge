name: tests

# The suite runs standalone — tests/indigo_stub.py replaces the `indigo`
# module and the plugin guards its paho/third-party imports, so plain ubuntu
# runners need nothing beyond pytest.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"   # matches Indigo 2025.2's embedded Python

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run test suite
        run: python -m pytest tests -q

      - name: Lint (ruff — errors only, see ruff.toml)
        run: |
          pip install ruff
          ruff check .
